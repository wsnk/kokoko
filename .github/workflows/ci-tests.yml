

name: Python Style and Unit Tests

on:
    push:
        branches:
          - master
        paths:
            - 'python/**'
            - 'scripts/**'
            - '.github/workflows/ci-tests.yml'
    pull_request:
        paths:
            - 'python/**'
            - 'scripts/**'
            - '.github/workflows/ci-tests.yml'

jobs:
    lint-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install uv
              run: |
                curl -LsSf https://astral.sh/uv/install.sh | sh

            - name: Test Python Packages
              run: |
                  ./scripts/test-python-packages.sh
